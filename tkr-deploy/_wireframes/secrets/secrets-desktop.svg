    <text x="830" y="30" class="text-tertiary" font-size="11" letter-spacing="0.3">GROUPS</text>
    <text x="894" y="30" class="text-primary" font-size="13" font-weight="600">4</text>

    <text x="720" y="54" class="text-secondary" font-size="12">Open vault in tkr-secrets</text>
    <line x1="720" y1="57" x2="852" y2="57" stroke="#616161" stroke-width="1"/>
    <text x="855" y="54" class="text-tertiary" font-size="11">↗</text>
