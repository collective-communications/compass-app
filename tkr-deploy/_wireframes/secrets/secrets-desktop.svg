    <rect width="70" height="26" rx="13" fill="#424242"/>
    <text x="35" y="18" text-anchor="middle" class="text-inverse" font-size="13" font-weight="500">Secrets</text>
  </g>

  <text x="196" y="93" class="text-secondary" font-size="13">Database</text>
  <text x="270" y="93" class="text-secondary" font-size="13">Frontend</text>
  <text x="344" y="93" class="text-secondary" font-size="13">Email</text>
  <text x="398" y="93" class="text-secondary" font-size="13">CI/CD</text>

  <!-- ==================== VAULT STATUS BANNER ==================== -->
  <g transform="translate(32, 132)">
    <rect width="1216" height="72" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <!-- Lock icon -->
    <g transform="translate(20, 22)">
      <rect x="0" y="7" width="16" height="12" rx="2" fill="none" stroke="#212121" stroke-width="1.5"/>
      <path d="M3,7 L3,3 Q3,0 8,0 Q13,0 13,3" fill="none" stroke="#212121" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="8" cy="13" r="2" fill="#212121"/>
    </g>
    <text x="44" y="40" class="text-primary" font-size="15" font-weight="600">tkr-secrets vault</text>

    <!-- Unlocked badge -->
