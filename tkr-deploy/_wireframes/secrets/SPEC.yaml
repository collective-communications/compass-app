# tkr-deploy Secrets Sync — Wireframe Specification
# Bridges SVG wireframes to implementation requirements.

section: secrets
shell: app
route_prefix: "/secrets"

screens:
  - id: secrets
    file: secrets-mobile.svg
    desktop: secrets-desktop.svg
    route: "/secrets"
    purpose: "Display all secrets from the tkr-secrets encrypted vault with their sync status across Supabase, Vercel, and GitHub deployment targets — with one-click sync and diff-preview for out-of-sync secrets."

    shell_header:
      type: standard
      left: "tkr-deploy wordmark"
      center: ""
      right: "Vault status dot + lock icon + 'tkr-secrets · Unlocked' label"

    data_sources:
      - derived: vault_secrets
        logic: "Read from tkr-secrets vault API (localhost:3000). Returns array of { name, valuePreview, groups }. valuePreview is first 8 chars + ellipsis. Vault must be unlocked to read."

      - derived: sync_status_per_target
        logic: "For each secret, query each deployment target API (Supabase env vars, Vercel env vars, GitHub Actions secrets) and compare value hash to vault value hash. Returns { supabase: synced|missing|differs|na, vercel: synced|missing|differs|na, github: synced|missing|differs|na }."

      - derived: sync_summary
        logic: "Aggregate counts: total secrets, out-of-sync count (missing + differs), missing-target count. Displayed in the summary bar."

    layout:
      mobile: "Single-column card-per-secret layout. Each card shows secret name, vault value preview, and labeled target status rows (Supabase/Vercel/GitHub). Sync button per card for action-needed secrets."
      desktop: "Full table layout. Columns: Secret Name | Vault Value | Supabase | Vercel | GitHub | Action. Rows with missing or differs status have a 4px #212121 left border accent. Fully synced rows have no border accent."

    components:
      - element: vault_status_banner
        type: card
        content: "Vault name, locked/unlocked status badge, secret count, group count, link to tkr-secrets UI (localhost:3000). If vault is locked, shows prominent Unlock Vault button instead of stats."
        behavior: "Link opens tkr-secrets in new tab. Unlock Vault button deep-links to tkr-secrets unlock flow."
        note: "Vault state determines whether secrets table is populated or shows locked-state empty state."

      - element: sync_summary_bar
        type: toolbar
        content: "Horizontal stats: total secrets, out-of-sync count, missing-target count. Sync All button right-aligned."
        behavior: "Sync All triggers sequential sync to all out-of-sync targets for all secrets. Shows inline progress during sync (spinner in button, row-level status updates optimistically)."
        note: "Sync All is disabled if vault is locked."

      - element: target_filter_pills
        type: toolbar
        content: "Pill bar: All | Supabase | Vercel | GitHub"
        behavior: "Selecting a target filters the table/card list to show only secrets relevant to that target (secrets with n/a for that target are hidden). Active pill uses #424242 fill."
        note: "Filter is client-side — no re-fetch."

      - element: secrets_table
        type: list
        content: "One row per secret. Columns: Secret Name (bold), Vault Value (truncated monospace preview), target status columns (Supabase/Vercel/GitHub), Action column."
        behavior: |
          Status icons:
          - checkmark (#9E9E9E stroke) = synced
          - dash (#9E9E9E) = not applicable
          - X (#212121 stroke) = missing
          - ~ (#212121) = differs (value exists but differs from vault)
          Rows with missing or differs status get a 4px #212121 left border.
          Sync button on action-needed rows. For 'differs' rows, a Diff button appears alongside Sync to preview the diff before committing.
          Fully synced rows show a grey 'synced' pill instead of a button.
        note: "Desktop shows full table. Mobile collapses to card-per-secret layout."

      - element: diff_preview
        type: custom
        content: "Side-by-side diff view: vault value vs. current target value. Shows which chars/lines differ."
        behavior: "Opens as an inline expansion below the row on desktop, or a bottom sheet on mobile. Confirm Sync button within the diff view."
        note: "Only shown for 'differs' status rows. Prevents accidental overwrites."

    edge_cases:
      - vault_locked: "Secrets table shows empty state with lock icon and 'Vault is locked' message. Sync All and per-secret Sync buttons are disabled. Vault Status banner shows 'Locked' badge and prominent Unlock Vault button linking to localhost:3000."
      - vault_unreachable: "If tkr-secrets API returns an error or is not running, banner shows error state with 'Vault unreachable' message and a retry button. Secrets table shows last-known state if cached, otherwise shows empty state."
      - sync_partial_failure: "If Sync All encounters a failure on one target, that target's status updates to an error state inline on the row. Remaining targets continue syncing. No toast — error shown in the row's action column as 'Sync failed — retry'."
      - secret_value_empty: "If a secret in the vault has an empty value, it is displayed with a warning indicator in the Vault Value column and its Sync button is disabled with tooltip 'Vault value is empty — update in tkr-secrets before syncing'."
      - target_api_rate_limited: "If a target API returns 429, the sync is queued and retried after the rate-limit window. Row shows 'Queued' status with estimated retry time."
      - all_synced: "When all secrets are fully synced, the summary bar shows '0 out of sync' and the Sync All button is disabled with label 'All synced'. Rows show synced pills only."

    accessibility:
      - "Table column headers use <th scope='col'> with visible text — never icon-only column headers."
      - "Status icons (checkmark, X, tilde, dash) include aria-label attributes describing the status in words (e.g., aria-label='missing from GitHub')."
      - "Sync buttons include secret name in accessible label (e.g., aria-label='Sync RESEND_API_KEY to GitHub') to distinguish between multiple Sync buttons on the same page."
      - "Diff preview is keyboard accessible — opens with Enter/Space on Diff button, closes with Escape."
      - "Left border color accent is supplemented by text label ('missing', 'differs') — status is never communicated by border color alone."
      - "Filter pills are a <nav> with aria-label='Filter by deployment target'."

shared:
  header:
    type: standard
    left: "tkr-deploy wordmark (font-weight: 700, font-size: 17px mobile / 18px desktop)"
    right: "Vault status indicator: status dot + lock icon + 'tkr-secrets' label"

  navigation:
    type: pill_bar
    items:
      - { label: "Overview", route: "/" }
      - { label: "Secrets", route: "/secrets" }
      - { label: "Database", route: "/database" }
      - { label: "Frontend", route: "/frontend" }
      - { label: "Email", route: "/email" }
      - { label: "CI/CD", route: "/cicd" }
