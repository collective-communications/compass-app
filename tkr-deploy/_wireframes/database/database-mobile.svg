    <!-- Project ref row -->
    <text x="16" y="58" class="text-tertiary" font-size="10" letter-spacing="0.4">PROJECT REF</text>
    <text x="105" y="58" class="text-secondary" font-size="11">xyzabcdef123456</text>

    <!-- Region row -->
    <text x="16" y="76" class="text-tertiary" font-size="10" letter-spacing="0.4">REGION</text>
