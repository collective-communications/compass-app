  <!-- Email (inactive) -->
  <text x="283" y="83" class="text-secondary" font-size="12">Email</text>

  <!-- CI/CD partially visible to signal scroll -->
  <text x="330" y="83" class="text-secondary" font-size="12">CI/</text>

