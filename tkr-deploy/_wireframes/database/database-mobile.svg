  <!-- Wordmark: tkr-deploy -->
  <text x="16" y="35" class="text-primary" font-size="17" font-weight="700" letter-spacing="-0.3">tkr-deploy</text>

  <!-- Vault status indicator (right side) -->
  <!-- Lock icon (unlocked) -->
  <g transform="translate(270, 18)">
    <rect x="0" y="7" width="16" height="12" rx="2" fill="none" stroke="#616161" stroke-width="1.5"/>
    <path d="M3,7 L3,3 Q3,0 8,0 Q13,0 13,3" fill="none" stroke="#616161" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="8" cy="13" r="2" fill="#616161"/>
  </g>
  <text x="292" y="31" class="text-secondary" font-size="11">tkr-secrets</text>
  <!-- status dot: connected = dark -->
  <circle cx="262" cy="28" r="4" fill="#212121"/>

  <!-- ==================== PILL NAV BAR ==================== -->
