    <!-- Card header row: title + connected badge -->
    <text x="16" y="26" class="text-primary" font-size="13" font-weight="600">Connection Status</text>

    <!-- Connected status badge -->
    <rect x="246" y="12" width="89" height="20" rx="10" fill="#E0E0E0"/>
    <circle cx="261" cy="22" r="4" fill="#212121"/>
