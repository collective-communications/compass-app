    <rect width="596" height="108" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <text x="20" y="30" class="text-primary" font-size="14" font-weight="600">Connection Status</text>

    <!-- Connected status badge -->
    <rect x="430" y="14" width="105" height="22" rx="11" fill="#E0E0E0"/>
    <circle cx="447" cy="25" r="4.5" fill="#212121"/>
