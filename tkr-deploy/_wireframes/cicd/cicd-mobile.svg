    <text x="260" y="18" class="text-tertiary" font-size="10" letter-spacing="0.3">DURATION</text>
    <line x1="16" y1="24" x2="335" y2="24" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Run 1: ci.yml success -->
    <g transform="translate(16, 32)">
      <!-- status dot: success -->
      <circle cx="6" cy="10" r="5" fill="#212121"/>
      <text x="18" y="14" class="text-primary" font-size="11">ci.yml</text>
      <text x="154" y="14" class="text-secondary" font-size="11">push</text>
      <text x="244" y="14" class="text-secondary" font-size="11">2m 14s</text>
    </g>
    <text x="28" y="58" class="text-tertiary" font-size="10">main · today 14:21</text>
    <line x1="16" y1="66" x2="335" y2="66" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Run 2: deploy.yml failed -->
    <g transform="translate(16, 74)">
      <!-- status dot: failed (mid-grey) -->
      <circle cx="6" cy="10" r="5" fill="#616161"/>
      <text x="18" y="14" class="text-primary" font-size="11">deploy.yml</text>
      <text x="154" y="14" class="text-secondary" font-size="11">push</text>
      <text x="244" y="14" class="text-secondary" font-size="11">0m 47s</text>
    </g>
    <text x="28" y="100" class="text-tertiary" font-size="10">main · today 14:22</text>
    <line x1="16" y1="108" x2="335" y2="108" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Run 3: ci.yml success -->
    <g transform="translate(16, 116)">
      <circle cx="6" cy="10" r="5" fill="#212121"/>
      <text x="18" y="14" class="text-primary" font-size="11">ci.yml</text>
      <text x="154" y="14" class="text-secondary" font-size="11">pull_request</text>
      <text x="244" y="14" class="text-secondary" font-size="11">1m 58s</text>
    </g>
    <text x="28" y="142" class="text-tertiary" font-size="10">main · yesterday 16:44</text>
    <line x1="16" y1="150" x2="335" y2="150" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Run 4: deploy.yml failed -->
    <g transform="translate(16, 158)">
      <circle cx="6" cy="10" r="5" fill="#616161"/>
      <text x="18" y="14" class="text-primary" font-size="11">deploy.yml</text>
      <text x="154" y="14" class="text-secondary" font-size="11">push</text>
      <text x="244" y="14" class="text-secondary" font-size="11">0m 52s</text>
    </g>
    <text x="28" y="184" class="text-tertiary" font-size="10">main · yesterday 16:45</text>
    <line x1="16" y1="192" x2="335" y2="192" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Run 5: ci.yml success -->
    <g transform="translate(16, 200)">
      <circle cx="6" cy="10" r="5" fill="#212121"/>
      <text x="18" y="14" class="text-primary" font-size="11">ci.yml</text>
      <text x="154" y="14" class="text-secondary" font-size="11">push</text>
      <text x="244" y="14" class="text-secondary" font-size="11">2m 03s</text>
    </g>
    <text x="28" y="226" class="text-tertiary" font-size="10">main · yesterday 09:12</text>
    <line x1="16" y1="234" x2="335" y2="234" stroke="#E0E0E0" stroke-width="1"/>

    <!-- View all link -->
    <text x="175.5" y="258" text-anchor="middle" class="text-secondary" font-size="11">View all runs on GitHub</text>
    <line x1="103" y1="261" x2="248" y2="261" stroke="#616161" stroke-width="1"/>
  </g>

</svg>
