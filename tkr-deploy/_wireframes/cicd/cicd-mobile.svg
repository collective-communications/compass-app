    <text x="20" y="52" class="text-secondary" font-size="11">Keeps Supabase free-tier project from pausing.</text>
    <text x="20" y="68" class="text-secondary" font-size="11">Runs on a schedule to ping the DB.</text>

    <!-- Status note -->
    <text x="20" y="88" class="text-tertiary" font-size="10">Workflow file not found in .github/workflows/</text>

    <!-- Create Workflow button -->
    <g transform="translate(20, 100)">
      <rect width="136" height="24" rx="6" fill="#424242"/>
      <text x="68" y="16" text-anchor="middle" class="text-inverse" font-size="11" font-weight="500">Create Workflow</text>
    </g>

