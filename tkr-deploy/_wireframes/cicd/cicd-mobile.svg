      <text x="16" y="16" class="text-primary" font-size="12">VERCEL_PROJECT_ID</text>
      <rect x="262" y="4" width="58" height="18" rx="9" fill="#E0E0E0"/>
      <text x="291" y="17" text-anchor="middle" class="text-secondary" font-size="10" font-weight="600">Missing</text>
    </g>
    <line x1="16" y1="268" x2="335" y2="268" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Secret 7: VITE_SUPABASE_URL — missing -->
    <g transform="translate(0, 276)">
      <rect x="0" y="0" width="3" height="28" fill="#212121" rx="1.5"/>
      <text x="16" y="16" class="text-primary" font-size="12">VITE_SUPABASE_URL</text>
      <rect x="262" y="4" width="58" height="18" rx="9" fill="#E0E0E0"/>
      <text x="291" y="17" text-anchor="middle" class="text-secondary" font-size="10" font-weight="600">Missing</text>
    </g>
    <line x1="16" y1="312" x2="335" y2="312" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Secret 8: VITE_SUPABASE_ANON_KEY — missing -->
    <g transform="translate(0, 320)">
      <rect x="0" y="0" width="3" height="28" fill="#212121" rx="1.5"/>
      <text x="16" y="16" class="text-primary" font-size="12">VITE_SUPABASE_ANON_KEY</text>
      <rect x="262" y="4" width="58" height="18" rx="9" fill="#E0E0E0"/>
      <text x="291" y="17" text-anchor="middle" class="text-secondary" font-size="10" font-weight="600">Missing</text>
    </g>
    <line x1="16" y1="356" x2="335" y2="356" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Secret 9: E2E_SUPABASE_SERVICE_KEY — missing -->
    <g transform="translate(0, 364)">
      <rect x="0" y="0" width="3" height="28" fill="#212121" rx="1.5"/>
      <text x="16" y="16" class="text-primary" font-size="12">E2E_SUPABASE_SERVICE_KEY</text>
      <rect x="248" y="4" width="72" height="18" rx="9" fill="#E0E0E0"/>
      <text x="284" y="17" text-anchor="middle" class="text-secondary" font-size="10" font-weight="600">Missing</text>
    </g>
    <line x1="16" y1="400" x2="335" y2="400" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Summary note at bottom -->
    <text x="16" y="424" class="text-tertiary" font-size="10">6 secrets missing — Sync from Vault to configure</text>

    <!-- Sync from Vault button (inline, within card) -->
