      <text x="291" y="17" text-anchor="middle" class="text-secondary" font-size="10" font-weight="600">Missing</text>
    </g>
    <line x1="16" y1="224" x2="335" y2="224" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Secret 6: VERCEL_PROJECT_ID — missing -->
    <g transform="translate(0, 232)">
