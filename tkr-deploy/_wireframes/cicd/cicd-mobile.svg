<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 1820" width="375" height="1820">
  <defs>
    <style>
      .text-primary   { fill: #212121; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-secondary  { fill: #616161; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-tertiary   { fill: #9E9E9E; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-inverse    { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="1820" fill="#F5F5F5"/>

  <!-- ==================== TOP BAR ==================== -->
  <rect width="375" height="56" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" y="0"/>

  <!-- Wordmark: tkr-deploy -->
  <text x="16" y="35" class="text-primary" font-size="17" font-weight="700" letter-spacing="-0.3">tkr-deploy</text>

  <!-- Vault status indicator (right side) -->
  <!-- Lock icon (unlocked) -->
  <g transform="translate(270, 18)">
    <rect x="0" y="7" width="16" height="12" rx="2" fill="none" stroke="#616161" stroke-width="1.5"/>
    <path d="M3,7 L3,3 Q3,0 8,0 Q13,0 13,3" fill="none" stroke="#616161" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="8" cy="13" r="2" fill="#616161"/>
  </g>
  <text x="292" y="31" class="text-secondary" font-size="11">tkr-secrets</text>
  <!-- status dot: connected -->
  <circle cx="262" cy="28" r="4" fill="#212121"/>

  <!-- ==================== PILL NAV BAR ==================== -->
  <rect y="56" width="375" height="44" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Overview pill (inactive) -->
  <text x="12" y="85" class="text-secondary" font-size="12">Overview</text>

  <!-- Secrets pill (inactive) -->
  <text x="80" y="85" class="text-secondary" font-size="12">Secrets</text>

  <!-- Database pill (inactive) -->
  <text x="137" y="85" class="text-secondary" font-size="12">Database</text>

  <!-- Frontend pill (inactive) -->
  <text x="202" y="85" class="text-secondary" font-size="12">Frontend</text>

  <!-- Email pill (inactive) -->
  <text x="268" y="85" class="text-secondary" font-size="12">Email</text>

  <!-- CI/CD pill (active) -->
  <g transform="translate(311, 68)">
    <rect width="52" height="24" rx="12" fill="#424242"/>
    <text x="26" y="16.5" text-anchor="middle" class="text-inverse" font-size="12" font-weight="500">CI/CD</text>
  </g>

  <!-- ==================== REPOSITORY CARD ==================== -->
  <g transform="translate(12, 116)">
    <rect width="351" height="72" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <!-- Label -->
    <text x="16" y="20" class="text-tertiary" font-size="10" font-weight="500" letter-spacing="0.4">REPOSITORY</text>

    <!-- Repo name -->
    <text x="16" y="40" class="text-primary" font-size="14" font-weight="600">collective-communications/compass-app</text>

    <!-- Default branch label + value -->
    <text x="16" y="58" class="text-tertiary" font-size="10">Default branch</text>
    <text x="95" y="58" class="text-secondary" font-size="10">main</text>

    <!-- External link icon (open in GitHub) -->
    <g transform="translate(322, 24)">
      <!-- box with arrow indicating external link -->
      <rect x="0" y="4" width="11" height="11" rx="1.5" fill="none" stroke="#9E9E9E" stroke-width="1.5"/>
      <path d="M6,0 L15,0 L15,9" fill="none" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="8" y1="7" x2="15" y2="0" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ==================== WORKFLOW STATUS SECTION ==================== -->
  <!-- Section header row -->
  <text x="12" y="212" class="text-secondary" font-size="12" font-weight="600" letter-spacing="0.3">WORKFLOWS</text>
  <text x="100" y="212" class="text-tertiary" font-size="12">3 workflows</text>

  <!-- Workflow card 1: ci.yml — success -->
  <g transform="translate(12, 220)">
    <rect width="351" height="118" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <!-- ci.yml filename + status -->
    <text x="16" y="22" class="text-primary" font-size="13" font-weight="600">ci.yml</text>
    <!-- success status dot -->
    <circle cx="230" cy="17" r="5" fill="#212121"/>
    <text x="240" y="21" class="text-primary" font-size="11" font-weight="500">Passed</text>

    <!-- Trigger + branch -->
    <text x="16" y="40" class="text-tertiary" font-size="10" letter-spacing="0.3">TRIGGER</text>
    <text x="59" y="40" class="text-secondary" font-size="10">push · main</text>

    <line x1="16" y1="50" x2="335" y2="50" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Duration + timestamp row -->
    <text x="16" y="66" class="text-secondary" font-size="11">Duration</text>
    <text x="71" y="66" class="text-primary" font-size="11" font-weight="500">2m 14s</text>

    <text x="16" y="84" class="text-secondary" font-size="11">Last run</text>
    <text x="66" y="84" class="text-tertiary" font-size="11">today at 14:21 UTC</text>

    <!-- View Runs link -->
    <text x="16" y="104" class="text-secondary" font-size="11">View Runs</text>
    <line x1="16" y1="107" x2="68" y2="107" stroke="#616161" stroke-width="1"/>
  </g>

  <!-- Workflow card 2: deploy.yml — warning (has project-ref flag bug) -->
  <g transform="translate(12, 350)">
    <!-- Warning left border -->
    <rect width="4" height="134" rx="2" fill="#616161"/>
    <rect x="4" width="347" height="134" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <!-- deploy.yml filename + status -->
    <text x="20" y="22" class="text-primary" font-size="13" font-weight="600">deploy.yml</text>
    <!-- failure status dot -->
    <circle cx="234" cy="17" r="5" fill="#616161"/>
    <text x="244" y="21" class="text-secondary" font-size="11" font-weight="500">Failed</text>

    <!-- Warning indicator for the project-ref flag bug -->
    <!-- Warning triangle icon -->
    <g transform="translate(285, 8)">
      <path d="M8,0 L16,16 L0,16 Z" fill="none" stroke="#616161" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="8" y="13" text-anchor="middle" class="text-secondary" font-size="9" font-weight="700">!</text>
    </g>
    <text x="303" y="19" class="text-tertiary" font-size="9">Bug</text>

    <!-- Trigger + branch -->
    <text x="20" y="40" class="text-tertiary" font-size="10" letter-spacing="0.3">TRIGGER</text>
    <text x="63" y="40" class="text-secondary" font-size="10">push · main</text>

    <line x1="20" y1="50" x2="335" y2="50" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Bug note -->
    <text x="20" y="66" class="text-tertiary" font-size="10">Known issue: --project-ref flag missing in deploy step</text>

    <!-- Duration + timestamp row -->
    <text x="20" y="84" class="text-secondary" font-size="11">Duration</text>
    <text x="75" y="84" class="text-primary" font-size="11" font-weight="500">0m 47s</text>

    <text x="20" y="102" class="text-secondary" font-size="11">Last run</text>
    <text x="70" y="102" class="text-tertiary" font-size="11">today at 14:22 UTC</text>

    <!-- View Runs link -->
    <text x="20" y="122" class="text-secondary" font-size="11">View Runs</text>
    <line x1="20" y1="125" x2="72" y2="125" stroke="#616161" stroke-width="1"/>
  </g>

  <!-- Workflow card 3: supabase-keepalive.yml — Not Created -->
  <g transform="translate(12, 496)">
    <!-- Warning left border (not created) -->
    <rect width="4" height="134" rx="2" fill="#9E9E9E"/>
    <rect x="4" width="347" height="134" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <!-- supabase-keepalive.yml filename + status -->
