    <rect width="351" height="272" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <!-- Column headers -->
    <text x="28" y="18" class="text-tertiary" font-size="10" letter-spacing="0.3">WORKFLOW</text>
