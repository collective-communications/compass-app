<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 980" width="1280" height="980">
  <defs>
    <style>
      .text-primary   { fill: #212121; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-secondary  { fill: #616161; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-tertiary   { fill: #9E9E9E; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-inverse    { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="980" fill="#F5F5F5"/>

  <!-- ==================== TOP BAR ==================== -->
  <rect width="1280" height="64" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" y="0"/>

  <!-- Wordmark: tkr-deploy -->
  <text x="32" y="40" class="text-primary" font-size="18" font-weight="700" letter-spacing="-0.3">tkr-deploy</text>

  <!-- Vault status indicator (right side) -->
  <g transform="translate(1150, 22)">
    <rect x="0" y="7" width="16" height="12" rx="2" fill="none" stroke="#616161" stroke-width="1.5"/>
    <path d="M3,7 L3,3 Q3,0 8,0 Q13,0 13,3" fill="none" stroke="#616161" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="8" cy="13" r="2" fill="#616161"/>
  </g>
  <text x="1172" y="38" class="text-secondary" font-size="12">tkr-secrets</text>
  <circle cx="1142" cy="32" r="4" fill="#212121"/>

  <!-- ==================== PILL NAV BAR ==================== -->
  <rect y="64" width="1280" height="48" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Overview pill (inactive) -->
  <text x="32" y="95" class="text-secondary" font-size="13">Overview</text>

  <!-- Secrets pill (inactive) -->
  <text x="118" y="95" class="text-secondary" font-size="13">Secrets</text>

  <!-- Database pill (inactive) -->
  <text x="186" y="95" class="text-secondary" font-size="13">Database</text>

  <!-- Frontend pill (inactive) -->
  <text x="264" y="95" class="text-secondary" font-size="13">Frontend</text>

  <!-- Email pill (active) -->
  <g transform="translate(344, 78)">
    <rect width="58" height="28" rx="14" fill="#424242"/>
    <text x="29" y="19" text-anchor="middle" class="text-inverse" font-size="13" font-weight="500">Email</text>
  </g>

  <!-- CI/CD pill (inactive) -->
  <text x="416" y="95" class="text-secondary" font-size="13">CI/CD</text>

  <!-- ==================== TOP ROW: Domain Status (60%) + Sending Stats (40%) ==================== -->
  <text x="32" y="140" class="text-secondary" font-size="12" font-weight="600" letter-spacing="0.3">EMAIL PROVIDER</text>

  <!-- Domain Status card (left, ~60%) -->
  <g transform="translate(32, 148)">
    <rect width="740" height="148" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <!-- Domain label -->
    <text x="20" y="26" class="text-tertiary" font-size="10" font-weight="500" letter-spacing="0.4">DOMAIN</text>

    <!-- Verified badge (top right) -->
    <rect x="648" y="12" width="72" height="22" rx="11" fill="#E0E0E0"/>
    <text x="684" y="26" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">Verified</text>

    <!-- Domain name -->
    <text x="20" y="54" class="text-primary" font-size="18" font-weight="600">mail.tuckers.link</text>

    <!-- Divider -->
    <line x1="20" y1="72" x2="720" y2="72" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Provider + Plan in two columns -->
    <text x="20" y="96" class="text-tertiary" font-size="10" letter-spacing="0.3">PROVIDER</text>
    <text x="100" y="96" class="text-secondary" font-size="12">Resend</text>

    <line x1="300" y1="82" x2="300" y2="130" stroke="#E0E0E0" stroke-width="1"/>

    <text x="320" y="96" class="text-tertiary" font-size="10" letter-spacing="0.3">PLAN</text>
    <text x="360" y="96" class="text-secondary" font-size="12">Free tier</text>

    <text x="20" y="118" class="text-tertiary" font-size="10" letter-spacing="0.3">LIMITS</text>
    <text x="100" y="118" class="text-secondary" font-size="12">3,000 emails/month · 1 domain · 2 req/s</text>

    <!-- Verify Domain button (disabled) -->
    <rect x="560" y="106" width="160" height="34" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
    <text x="640" y="127" text-anchor="middle" class="text-tertiary" font-size="13">Verify Domain</text>
  </g>

  <!-- Sending Stats card (right, ~40%) -->
  <g transform="translate(796, 148)">
    <rect width="452" height="148" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <!-- This month label -->
    <text x="20" y="26" class="text-tertiary" font-size="10" font-weight="500" letter-spacing="0.4">THIS MONTH</text>
    <text x="20" y="56" class="text-primary" font-size="26" font-weight="700">47</text>
    <text x="58" y="56" class="text-secondary" font-size="16">/ 3,000 emails</text>

    <!-- Progress bar track -->
    <rect x="20" y="66" width="412" height="6" rx="3" fill="#E0E0E0"/>
    <!-- Fill: ~1.6% -->
    <rect x="20" y="66" width="7" height="6" rx="3" fill="#424242"/>
    <text x="432" y="76" text-anchor="end" class="text-tertiary" font-size="10">1.6%</text>

    <!-- Divider -->
    <line x1="20" y1="86" x2="432" y2="86" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Three stat columns: Today | Rate Limit | Bounce Rate -->
    <text x="20" y="106" class="text-tertiary" font-size="10" letter-spacing="0.3">TODAY</text>
    <text x="20" y="126" class="text-primary" font-size="18" font-weight="600">12</text>
    <text x="20" y="142" class="text-tertiary" font-size="10">emails sent</text>

    <line x1="158" y1="94" x2="158" y2="150" stroke="#E0E0E0" stroke-width="1"/>

    <text x="172" y="106" class="text-tertiary" font-size="10" letter-spacing="0.3">RATE LIMIT</text>
    <text x="172" y="126" class="text-primary" font-size="18" font-weight="600">2 req/s</text>
    <text x="172" y="142" class="text-tertiary" font-size="10">max throughput</text>

    <line x1="312" y1="94" x2="312" y2="150" stroke="#E0E0E0" stroke-width="1"/>

    <text x="326" y="106" class="text-tertiary" font-size="10" letter-spacing="0.3">BOUNCE RATE</text>
    <text x="326" y="126" class="text-primary" font-size="18" font-weight="600">0.2%</text>
    <text x="326" y="142" class="text-tertiary" font-size="10">this month</text>
  </g>

  <!-- ==================== BOTTOM ROW: DNS Records (full-width left) + API Key (sidebar right) ==================== -->
  <text x="32" y="334" class="text-secondary" font-size="12" font-weight="600" letter-spacing="0.3">DNS RECORDS</text>

  <!-- DNS Records card (left, ~60%) -->
  <g transform="translate(32, 342)">
    <rect width="740" height="358" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <!-- Card header row -->
    <text x="20" y="30" class="text-primary" font-size="14" font-weight="600">DNS Records</text>
    <!-- 2/3 badge -->
    <rect x="630" y="14" width="90" height="22" rx="11" fill="#E0E0E0"/>
    <text x="675" y="28" text-anchor="middle" class="text-secondary" font-size="11" font-weight="600">2 / 3 verified</text>

    <!-- Table header row -->
    <rect x="0" y="46" width="740" height="30" rx="0" fill="#F5F5F5"/>
    <text x="20" y="65" class="text-tertiary" font-size="10" font-weight="600" letter-spacing="0.5">RECORD</text>
    <text x="100" y="65" class="text-tertiary" font-size="10" font-weight="600" letter-spacing="0.5">TYPE</text>
    <text x="160" y="65" class="text-tertiary" font-size="10" font-weight="600" letter-spacing="0.5">STATUS</text>
    <text x="280" y="65" class="text-tertiary" font-size="10" font-weight="600" letter-spacing="0.5">HOST</text>
    <text x="480" y="65" class="text-tertiary" font-size="10" font-weight="600" letter-spacing="0.5">VALUE</text>

    <!-- Divider under header -->
    <line x1="0" y1="76" x2="740" y2="76" stroke="#E0E0E0" stroke-width="1"/>

    <!-- SPF row (verified) -->
    <g transform="translate(0, 84)">
      <text x="20" y="20" class="text-primary" font-size="13" font-weight="600">SPF</text>

      <!-- TXT badge -->
      <rect x="100" y="6" width="30" height="18" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
      <text x="115" y="18" text-anchor="middle" class="text-tertiary" font-size="10" font-weight="500">TXT</text>

      <!-- Verified indicator -->
      <circle cx="170" cy="14" r="8" fill="none" stroke="#424242" stroke-width="1.5"/>
      <path d="M165,14 L169,18 L175,10" fill="none" stroke="#424242" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="186" y="18" class="text-primary" font-size="11" font-weight="500">Verified</text>

      <!-- Host value + copy -->
      <text x="280" y="12" class="text-secondary" font-size="11">@</text>
      <g transform="translate(295, 4)">
        <rect x="0" y="2" width="10" height="10" rx="2" fill="none" stroke="#9E9E9E" stroke-width="1.2"/>
        <rect x="2" y="0" width="10" height="10" rx="2" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="1.2"/>
      </g>

      <!-- Value truncated + copy -->
      <text x="480" y="12" class="text-secondary" font-size="11">v=spf1 include:resend.net ~all</text>
      <g transform="translate(716, 4)">
        <rect x="0" y="2" width="10" height="10" rx="2" fill="none" stroke="#9E9E9E" stroke-width="1.2"/>
        <rect x="2" y="0" width="10" height="10" rx="2" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="1.2"/>
      </g>
    </g>

    <!-- Divider -->
    <line x1="0" y1="118" x2="740" y2="118" stroke="#E0E0E0" stroke-width="1"/>

    <!-- DKIM row (verified) -->
    <g transform="translate(0, 126)">
      <text x="20" y="20" class="text-primary" font-size="13" font-weight="600">DKIM</text>

      <!-- CNAME badge -->
      <rect x="100" y="6" width="44" height="18" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
      <text x="122" y="18" text-anchor="middle" class="text-tertiary" font-size="10" font-weight="500">CNAME</text>

      <!-- Verified indicator -->
      <circle cx="170" cy="14" r="8" fill="none" stroke="#424242" stroke-width="1.5"/>
      <path d="M165,14 L169,18 L175,10" fill="none" stroke="#424242" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="186" y="18" class="text-primary" font-size="11" font-weight="500">Verified</text>

      <!-- Host value (truncated) -->
      <text x="280" y="12" class="text-secondary" font-size="11">resend._domainkey.mail...</text>
      <g transform="translate(460, 4)">
        <rect x="0" y="2" width="10" height="10" rx="2" fill="none" stroke="#9E9E9E" stroke-width="1.2"/>
        <rect x="2" y="0" width="10" height="10" rx="2" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="1.2"/>
      </g>

      <!-- Value truncated -->
      <text x="480" y="12" class="text-secondary" font-size="11">feedback.resend.com</text>
      <g transform="translate(716, 4)">
        <rect x="0" y="2" width="10" height="10" rx="2" fill="none" stroke="#9E9E9E" stroke-width="1.2"/>
        <rect x="2" y="0" width="10" height="10" rx="2" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="1.2"/>
      </g>
    </g>

    <!-- Divider -->
    <line x1="0" y1="160" x2="740" y2="160" stroke="#E0E0E0" stroke-width="1"/>

    <!-- DMARC row (not verified) — left border accent -->
    <rect x="0" y="160" width="4" height="128" rx="2" fill="#212121"/>

    <g transform="translate(0, 168)">
      <text x="20" y="20" class="text-primary" font-size="13" font-weight="600">DMARC</text>

      <!-- TXT badge -->
      <rect x="100" y="6" width="30" height="18" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
      <text x="115" y="18" text-anchor="middle" class="text-tertiary" font-size="10" font-weight="500">TXT</text>

      <!-- Not verified indicator -->
      <circle cx="170" cy="14" r="8" fill="none" stroke="#9E9E9E" stroke-width="1.5"/>
      <path d="M166,10 L174,18 M174,10 L166,18" fill="none" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
      <text x="186" y="18" class="text-secondary" font-size="11">Not verified</text>

      <!-- Host value + copy -->
      <text x="280" y="12" class="text-secondary" font-size="11">_dmarc.mail.tuckers.link</text>
      <g transform="translate(460, 4)">
        <rect x="0" y="2" width="10" height="10" rx="2" fill="none" stroke="#9E9E9E" stroke-width="1.2"/>
        <rect x="2" y="0" width="10" height="10" rx="2" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="1.2"/>
      </g>

      <!-- Full value (expanded, shown on desktop by default) -->
      <text x="480" y="12" class="text-secondary" font-size="11">v=DMARC1; p=none; rua=mailto:dmarc@...</text>
      <g transform="translate(716, 4)">
        <rect x="0" y="2" width="10" height="10" rx="2" fill="none" stroke="#9E9E9E" stroke-width="1.2"/>
        <rect x="2" y="0" width="10" height="10" rx="2" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="1.2"/>
      </g>

      <!-- Add record guidance -->
      <rect x="20" y="30" width="680" height="56" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
      <text x="36" y="50" class="text-secondary" font-size="11" font-weight="600">To add this record in your DNS provider:</text>
      <text x="36" y="68" class="text-tertiary" font-size="11">Type: TXT  ·  Host: _dmarc  ·  Value: v=DMARC1; p=none; rua=mailto:dmarc@mail.tuckers.link</text>
    </g>

    <!-- Divider before refresh note -->
    <line x1="20" y1="310" x2="720" y2="310" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Refresh hint -->
    <text x="20" y="330" class="text-tertiary" font-size="11">DNS propagation can take up to 48 hours after adding records.</text>
    <!-- Refresh button -->
    <rect x="590" y="316" width="130" height="30" rx="6" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>
    <text x="655" y="334" text-anchor="middle" class="text-secondary" font-size="12">Refresh Status</text>
  </g>

  <!-- API Key card (right sidebar, ~40%) -->
  <text x="796" y="334" class="text-secondary" font-size="12" font-weight="600" letter-spacing="0.3">API KEY</text>

  <g transform="translate(796, 342)">
    <rect width="452" height="262" rx="8" fill="#FFFFFF" stroke="#E5E4E0" stroke-width="1"/>

    <!-- Key name -->
    <text x="20" y="26" class="text-tertiary" font-size="10" font-weight="500" letter-spacing="0.4">KEY NAME</text>
    <text x="20" y="52" class="text-primary" font-size="16" font-weight="600">tkr-deploy-production</text>

    <!-- Divider -->
    <line x1="20" y1="66" x2="432" y2="66" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Meta rows -->
    <text x="20" y="88" class="text-tertiary" font-size="10" letter-spacing="0.3">CREATED</text>
    <text x="120" y="88" class="text-secondary" font-size="12">Feb 12, 2026</text>

    <text x="20" y="112" class="text-tertiary" font-size="10" letter-spacing="0.3">PERMISSIONS</text>
    <rect x="120" y="98" width="100" height="20" rx="10" fill="#E0E0E0"/>
    <text x="170" y="111" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">Sending access</text>

    <text x="20" y="136" class="text-tertiary" font-size="10" letter-spacing="0.3">DOMAIN</text>
    <text x="120" y="136" class="text-secondary" font-size="12">mail.tuckers.link</text>

    <!-- Divider -->
    <line x1="20" y1="150" x2="432" y2="150" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Vault sync section -->
    <text x="20" y="172" class="text-tertiary" font-size="10" letter-spacing="0.3">VAULT STATUS</text>
    <!-- sync status -->
    <circle cx="122" cy="167" r="4" fill="#212121"/>
    <text x="132" y="172" class="text-primary" font-size="12" font-weight="500">Synced to tkr-secrets</text>

    <text x="20" y="192" class="text-tertiary" font-size="11">Last synced today at 09:14 UTC</text>

    <!-- Divider -->
    <line x1="20" y1="206" x2="432" y2="206" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Key reference row -->
    <text x="20" y="224" class="text-tertiary" font-size="10" letter-spacing="0.3">VAULT KEY</text>
    <rect x="120" y="210" width="160" height="24" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
    <text x="200" y="225" text-anchor="middle" class="text-secondary" font-size="11" font-weight="500">RESEND_API_KEY</text>

    <!-- Security note -->
    <text x="20" y="252" class="text-tertiary" font-size="10">Never shown in plaintext · rotated on demand from vault</text>
  </g>

</svg>
