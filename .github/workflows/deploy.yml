name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Apply Supabase migrations
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.0
      - run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Configure Supabase production settings
        run: |
          # Set edge function secrets
          supabase secrets set \
            APP_URL=https://app.collectiveculturecompass.com \
            --project-ref "$SUPABASE_PROJECT_REF"

          # Configure auth: site_url and redirect allow-list via Management API
          CURRENT_AUTH=$(curl -sf \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/config/auth")

          CURRENT_ALLOW_LIST=$(echo "$CURRENT_AUTH" | python3 -c "
          import sys, json
          auth = json.load(sys.stdin)
          allow_list = auth.get('uri_allow_list', '')
          urls = [u.strip() for u in allow_list.split(',') if u.strip()]
          callback = 'https://app.collectiveculturecompass.com/auth/callback'
          if callback not in urls:
              urls.append(callback)
          print(','.join(urls))
          ")

          curl -sf -X PATCH \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"site_url\":\"https://app.collectiveculturecompass.com\",\"uri_allow_list\":\"$CURRENT_ALLOW_LIST\"}" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/config/auth"

          echo "Auth configured: site_url and redirect allow-list updated"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Deploy to Vercel
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          DEPLOYMENT_URL=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          npx vercel alias "$DEPLOYMENT_URL" app.collectiveculturecompass.com --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-storybook:
    name: Deploy Storybook
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for relevant changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            'apps/web/src/**' \
            'apps/storybook/**' \
            'packages/**' \
            'apps/web/src/index.css' \
            2>/dev/null || echo "force")
          if [[ -n "$CHANGED" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.changes.outputs.should_deploy == 'true'
        with:
          bun-version: "1.3.5"

      - name: Cache bun dependencies
        if: steps.changes.outputs.should_deploy == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        if: steps.changes.outputs.should_deploy == 'true'
        run: bun install --frozen-lockfile

      - name: Build Storybook
        if: steps.changes.outputs.should_deploy == 'true'
        run: bun run build-storybook

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.should_deploy == 'true'
        run: npx wrangler pages deploy apps/storybook/storybook-static --project-name=ccc-storybook --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
