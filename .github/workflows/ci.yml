name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  db-tests:
    name: pgTAP (Database)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations
        run: supabase db reset --local

      - name: Run pgTAP suite
        run: supabase test db --local

      - name: Stop stack
        if: always()
        run: supabase stop

  e2e-db-migrate:
    name: Prepare E2E Database
    runs-on: ubuntu-latest
    env:
      HAS_E2E_SECRETS: ${{ secrets.E2E_SUPABASE_SERVICE_KEY != '' }}
      HAS_SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
      HAS_SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD != '' }}
    steps:
      - name: Skip E2E database preparation
        if: env.HAS_E2E_SECRETS != 'true'
        run: echo "E2E Supabase secrets are not configured; skipping database preparation."

      - name: Require Supabase migration credentials
        if: env.HAS_E2E_SECRETS == 'true' && (env.HAS_SUPABASE_ACCESS_TOKEN != 'true' || env.HAS_SUPABASE_DB_PASSWORD != 'true')
        run: |
          echo "E2E Supabase secrets are configured, but CI cannot apply migrations."
          echo "Set SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD so E2E runs against the current schema."
          exit 1

      - uses: actions/checkout@v4
        if: env.HAS_E2E_SECRETS == 'true' && env.HAS_SUPABASE_ACCESS_TOKEN == 'true' && env.HAS_SUPABASE_DB_PASSWORD == 'true'

      - uses: supabase/setup-cli@v1
        if: env.HAS_E2E_SECRETS == 'true' && env.HAS_SUPABASE_ACCESS_TOKEN == 'true' && env.HAS_SUPABASE_DB_PASSWORD == 'true'
        with:
          version: 2.75.0

      - name: Apply migrations to E2E Supabase project
        if: env.HAS_E2E_SECRETS == 'true' && env.HAS_SUPABASE_ACCESS_TOKEN == 'true' && env.HAS_SUPABASE_DB_PASSWORD == 'true'
        run: |
          if [ -z "${E2E_SUPABASE_URL:-}" ]; then
            echo "E2E_SUPABASE_URL is required to derive the Supabase project ref."
            exit 1
          fi

          project_host="${E2E_SUPABASE_URL#https://}"
          project_host="${project_host#http://}"
          project_ref="${project_host%%.*}"

          if [ -z "$project_ref" ] || [ "$project_ref" = "$project_host" ]; then
            echo "Could not derive Supabase project ref from E2E_SUPABASE_URL."
            exit 1
          fi

          supabase link --project-ref "$project_ref"
          supabase db push
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  e2e:
    name: E2E (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    needs: [e2e-db-migrate]
    env:
      HAS_E2E_SECRETS: ${{ secrets.E2E_SUPABASE_SERVICE_KEY != '' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        if: env.HAS_E2E_SECRETS == 'true'
        with:
          bun-version: "1.3.5"

      - name: Cache bun dependencies
        if: env.HAS_E2E_SECRETS == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        if: env.HAS_E2E_SECRETS == 'true'
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        if: env.HAS_E2E_SECRETS == 'true'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('e2e/package.json') }}

      - name: Install Playwright Chromium
        if: env.HAS_E2E_SECRETS == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Install Playwright system deps
        if: env.HAS_E2E_SECRETS == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: e2e

      - name: E2E tests
        if: env.HAS_E2E_SECRETS == 'true'
        run: npx playwright test --shard=${{ matrix.shard }}/3
        working-directory: e2e
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_KEY }}
          E2E_SUPABASE_ANON_JWT: ${{ secrets.E2E_SUPABASE_ANON_JWT }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always() && env.HAS_E2E_SECRETS == 'true'
        with:
          name: blob-report-${{ matrix.shard }}
          path: e2e/blob-report/
          retention-days: 14

  e2e-report:
    name: Merge E2E Reports
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always() && needs.e2e.result != 'skipped'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: e2e/all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports
        working-directory: e2e

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
