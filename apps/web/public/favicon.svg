<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Clip everything to a circle -->
  <g clip-path="url(#circleClip)">

    <!-- Background -->
    <circle cx="256" cy="256" r="256" fill="#FAFAFA"/>

    <!-- Empty state ring -->
    <circle cx="256" cy="256" r="230" fill="#E5E4E0"/>

    <!-- Compass segments, centered at 256,256 -->
    <g transform="translate(256, 256)">

      <!-- CLARITY (Top) - Coral #FF7F50 -->
      <path d="M 0 0 L -173 -100 A 200 200 0 0 1 173 -100 L 0 0 Z"
            fill="#FF7F50"/>

      <!-- CONNECTION (Bottom-left) - Seafoam #9FD7C3 -->
      <path d="M 0 0 L 0 200 A 200 200 0 0 1 -173 -100 L 0 0 Z"
            fill="#9FD7C3"/>

      <!-- COLLABORATION (Bottom-right) - Salmon #E8B4A8 -->
      <path d="M 0 0 L 173 -100 A 200 200 0 0 1 0 200 L 0 0 Z"
            fill="#E8B4A8"/>

      <!-- Segment dividers -->
      <line x1="0" y1="0" x2="196" y2="-113" stroke="#FAFAFA" stroke-width="8"/>
      <line x1="0" y1="0" x2="0" y2="230" stroke="#FAFAFA" stroke-width="8"/>
      <line x1="0" y1="0" x2="-196" y2="-113" stroke="#FAFAFA" stroke-width="8"/>

      <!-- Core circle background -->
      <circle cx="0" cy="0" r="68" fill="#FAFAFA"/>

      <!-- Core circle -->
      <circle cx="0" cy="0" r="60" fill="#0C3D50"/>

    </g>
  </g>
</svg>
