<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 700" width="375" height="700">
  <defs>
    <style>
      .text-primary { fill: #212121; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-secondary { fill: #757575; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-inverse { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .label { fill: #757575; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 10px; }
      .screen { fill: #FFFFFF; font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 600; }
      .edge { fill: #757575; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 9px; }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#424242"/>
    </marker>
    <marker id="a-dash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#BDBDBD"/>
    </marker>
  </defs>

  <rect width="375" height="700" fill="#F5F5F5"/>

  <text x="16" y="36" class="text-primary" font-size="17" font-weight="700">User Flow Map</text>
  <text x="16" y="56" class="text-secondary" font-size="12">Screen navigation paths</text>

  <!-- ==================== PICKER (Entry) ==================== -->
  <g transform="translate(120, 80)">
    <rect width="136" height="44" rx="8" fill="#424242"/>
    <text x="68" y="27" text-anchor="middle" class="text-inverse" font-size="13" font-weight="600">Picker</text>
    <text x="68" y="60" text-anchor="middle" class="label">/ (entry point)</text>
  </g>

  <!-- Branch: Create New (left) -->
  <line x1="152" y1="124" x2="70" y2="178" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="80" y="152" class="edge">Create New</text>

  <!-- Branch: Select Locked (center) -->
  <line x1="188" y1="124" x2="188" y2="178" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="196" y="158" class="edge">Locked</text>

  <!-- Branch: Select Unlocked (right) -->
  <line x1="224" y1="124" x2="310" y2="300" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="272" y="200" class="edge">Unlocked</text>

  <!-- ==================== INIT ==================== -->
  <g transform="translate(16, 180)">
    <rect width="110" height="44" rx="8" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="55" y="27" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">Init</text>
  </g>

  <!-- Arrow: Init → Recovery Key -->
  <line x1="71" y1="224" x2="71" y2="298" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="79" y="264" class="edge">Create vault</text>

  <!-- ==================== UNLOCK ==================== -->
  <g transform="translate(133, 180)">
    <rect width="110" height="44" rx="8" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="55" y="27" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">Unlock</text>
  </g>

  <!-- Arrow: Unlock → Manage -->
  <line x1="188" y1="224" x2="188" y2="298" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="196" y="264" class="edge">Password OK</text>

  <!-- ==================== RECOVERY KEY ==================== -->
  <g transform="translate(16, 300)">
    <rect width="110" height="44" rx="8" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="55" y="18" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">Recovery</text>
    <text x="55" y="34" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">Key</text>
  </g>

  <!-- Arrow: Recovery Key → Manage -->
  <line x1="126" y1="322" x2="240" y2="322" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="156" y="316" class="edge">Confirmed saved</text>

  <!-- ==================== MANAGE ==================== -->
  <g transform="translate(242, 300)">
    <rect width="110" height="44" rx="8" fill="#424242"/>
    <text x="55" y="27" text-anchor="middle" class="text-inverse" font-size="13" font-weight="600">Manage</text>
  </g>

  <!-- Arrow: Manage → Lock → Picker (curved back) -->
  <line x1="297" y1="344" x2="297" y2="390" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="297" y1="390" x2="355" y2="390" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="355" y1="390" x2="355" y2="80" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="355" y1="80" x2="258" y2="80" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-dash)"/>
  <text x="308" y="384" class="edge">Lock / auto-lock</text>

  <!-- ==================== FORGOT PASSWORD PATH ==================== -->
  <text x="16" y="440" class="text-secondary" font-size="11" font-weight="600" letter-spacing="0.5">FORGOT PASSWORD PATH</text>

  <!-- Unlock → Recover -->
  <g transform="translate(16, 460)">
    <rect width="100" height="36" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="50" y="23" text-anchor="middle" class="text-secondary" font-size="11">Unlock</text>
  </g>

  <line x1="116" y1="478" x2="148" y2="478" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="118" y="470" class="edge">Forgot?</text>

  <g transform="translate(150, 460)">
    <rect width="100" height="36" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="50" y="23" text-anchor="middle" class="text-secondary" font-size="11">Recover</text>
  </g>

  <line x1="250" y1="478" x2="282" y2="478" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="248" y="470" class="edge">Reset</text>

  <g transform="translate(284, 456)">
    <rect width="76" height="44" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="38" y="18" text-anchor="middle" class="text-secondary" font-size="10">Recovery</text>
    <text x="38" y="32" text-anchor="middle" class="text-secondary" font-size="10">Key</text>
  </g>

  <line x1="322" y1="500" x2="322" y2="524" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>

  <g transform="translate(272, 526)">
    <rect width="100" height="36" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="50" y="23" text-anchor="middle" class="text-secondary" font-size="11">Manage</text>
  </g>

  <!-- ==================== RECOVER INPUT METHODS ==================== -->
  <g transform="translate(16, 590)">
    <text x="0" y="0" class="text-secondary" font-size="11" font-weight="600" letter-spacing="0.5">RECOVER SCREEN — INPUT METHODS</text>

    <g transform="translate(0, 16)">
      <rect width="105" height="32" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
      <text x="52" y="21" text-anchor="middle" class="text-secondary" font-size="10">Enter Phrase</text>
    </g>
    <g transform="translate(117, 16)">
      <rect width="105" height="32" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
      <text x="52" y="21" text-anchor="middle" class="text-secondary" font-size="10">Scan QR</text>
    </g>
    <g transform="translate(234, 16)">
      <rect width="105" height="32" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
      <text x="52" y="21" text-anchor="middle" class="text-secondary" font-size="10">Upload File</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(16, 668)">
    <rect width="12" height="12" rx="3" fill="#424242"/>
    <text x="18" y="11" class="label">Primary screen</text>
    <rect x="110" y="0" width="12" height="12" rx="3" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="128" y="11" class="label">Secondary screen</text>
    <line x1="230" y1="6" x2="250" y2="6" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="256" y="10" class="label">Return path</text>
  </g>
</svg>