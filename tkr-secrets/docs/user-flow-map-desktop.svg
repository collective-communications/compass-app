<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" width="1280" height="480">
  <defs>
    <style>
      .text-primary { fill: #212121; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-secondary { fill: #757575; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-inverse { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .label { fill: #757575; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 11px; }
      .edge { fill: #757575; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 10px; }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#424242"/>
    </marker>
    <marker id="a-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#BDBDBD"/>
    </marker>
  </defs>

  <rect width="1280" height="480" fill="#F5F5F5"/>

  <text x="32" y="40" class="text-primary" font-size="20" font-weight="700">User Flow Map</text>
  <text x="32" y="64" class="text-secondary" font-size="13">Screen navigation paths — three entry flows from Picker</text>

  <!-- ==================== MAIN FLOW (horizontal) ==================== -->

  <!-- PICKER -->
  <g transform="translate(32, 140)">
    <rect width="160" height="56" rx="10" fill="#424242"/>
    <text x="80" y="28" text-anchor="middle" class="text-inverse" font-size="14" font-weight="600">Picker</text>
    <text x="80" y="44" text-anchor="middle" fill="#BDBDBD" font-family="'SF Mono', monospace" font-size="10">/</text>
    <text x="80" y="76" text-anchor="middle" class="label">Entry point — list vaults</text>
  </g>

  <!-- Three branches from Picker -->

  <!-- Branch 1: Create New → Init → Recovery Key → Manage -->
  <line x1="192" y1="148" x2="260" y2="120" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="204" y="122" class="edge">Create New</text>

  <g transform="translate(262, 100)">
    <rect width="130" height="44" rx="8" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="65" y="27" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">Init</text>
  </g>

  <line x1="392" y1="122" x2="440" y2="122" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="398" y="114" class="edge">Created</text>

  <g transform="translate(442, 100)">
    <rect width="130" height="44" rx="8" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="65" y="18" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">Recovery</text>
    <text x="65" y="34" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">Key</text>
  </g>

  <line x1="572" y1="122" x2="618" y2="168" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="580" y="140" class="edge">Saved</text>

  <!-- Branch 2: Select Locked → Unlock → Manage -->
  <line x1="192" y1="168" x2="260" y2="168" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="204" y="162" class="edge">Locked</text>

  <g transform="translate(262, 146)">
    <rect width="130" height="44" rx="8" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="65" y="27" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">Unlock</text>
  </g>

  <line x1="392" y1="168" x2="618" y2="168" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="480" y="162" class="edge">Password OK</text>

  <!-- Branch 3: Select Unlocked → Manage -->
  <line x1="192" y1="188" x2="618" y2="200" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="380" y="206" class="edge">Already unlocked</text>

  <!-- MANAGE -->
  <g transform="translate(620, 148)">
    <rect width="160" height="56" rx="10" fill="#424242"/>
    <text x="80" y="28" text-anchor="middle" class="text-inverse" font-size="14" font-weight="600">Manage</text>
    <text x="80" y="44" text-anchor="middle" fill="#BDBDBD" font-family="'SF Mono', monospace" font-size="10">/vault/:name/manage</text>
    <text x="80" y="76" text-anchor="middle" class="label">CRUD secrets, groups, import</text>
  </g>

  <!-- Lock return path: Manage → Picker -->
  <path d="M 700 204 L 700 240 Q 700 250 690 250 L 122 250 Q 112 250 112 240 L 112 196" fill="none" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-d)"/>
  <text x="380" y="264" text-anchor="middle" class="edge">Lock / auto-lock timeout</text>

  <!-- ==================== FORGOT PASSWORD PATH ==================== -->
  <g transform="translate(32, 310)">
    <text x="0" y="0" class="text-secondary" font-size="12" font-weight="600" letter-spacing="0.5">FORGOT PASSWORD PATH</text>

    <!-- Unlock -->
    <g transform="translate(0, 20)">
      <rect width="120" height="40" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
      <text x="60" y="25" text-anchor="middle" class="text-secondary" font-size="12">Unlock</text>
    </g>

    <line x1="120" y1="40" x2="168" y2="40" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="126" y="32" class="edge">Forgot?</text>

    <!-- Recover -->
    <g transform="translate(170, 20)">
      <rect width="120" height="40" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
      <text x="60" y="25" text-anchor="middle" class="text-secondary" font-size="12">Recover</text>
    </g>

    <line x1="290" y1="40" x2="338" y2="40" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="296" y="32" class="edge">Key accepted</text>

    <!-- Recovery Key -->
    <g transform="translate(340, 16)">
      <rect width="120" height="48" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
      <text x="60" y="20" text-anchor="middle" class="text-secondary" font-size="11">Recovery</text>
      <text x="60" y="36" text-anchor="middle" class="text-secondary" font-size="11">Key (new)</text>
    </g>

    <line x1="460" y1="40" x2="508" y2="40" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="466" y="32" class="edge">Confirmed</text>

    <!-- Manage -->
    <g transform="translate(510, 20)">
      <rect width="120" height="40" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
      <text x="60" y="25" text-anchor="middle" class="text-secondary" font-size="12">Manage</text>
    </g>

    <!-- Recover input methods -->
    <g transform="translate(170, 80)">
      <text x="0" y="0" class="label">Recovery input methods:</text>
      <rect x="0" y="10" width="90" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <text x="45" y="26" text-anchor="middle" class="text-secondary" font-size="10">Enter Phrase</text>
      <rect x="100" y="10" width="70" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <text x="135" y="26" text-anchor="middle" class="text-secondary" font-size="10">Scan QR</text>
      <rect x="180" y="10" width="90" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <text x="225" y="26" text-anchor="middle" class="text-secondary" font-size="10">Upload File</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(32, 446)">
    <rect width="14" height="14" rx="4" fill="#424242"/>
    <text x="20" y="12" class="label">Primary screen</text>
    <rect x="140" y="0" width="14" height="14" rx="4" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="160" y="12" class="label">Secondary screen</text>
    <line x1="280" y1="7" x2="310" y2="7" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="318" y="12" class="label">Navigation</text>
    <line x1="400" y1="7" x2="430" y2="7" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="438" y="12" class="label">Return path</text>
  </g>
</svg>