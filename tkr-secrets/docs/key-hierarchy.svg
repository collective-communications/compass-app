<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 820" width="375" height="820">
  <defs>
    <style>
      .text-primary { fill: #212121; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-secondary { fill: #757575; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-inverse { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .label { fill: #757575; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 10px; }
      .key-label { fill: #FFFFFF; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 11px; font-weight: 600; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#424242"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E7D32"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565C0"/>
    </marker>
  </defs>

  <rect width="375" height="820" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="16" y="36" class="text-primary" font-size="17" font-weight="700">Key Hierarchy</text>
  <text x="16" y="56" class="text-secondary" font-size="12">Dual unlock paths: password and recovery</text>

  <!-- ==================== PATH A: PASSWORD ==================== -->
  <g transform="translate(16, 80)">
    <text x="0" y="0" class="text-secondary" font-size="11" font-weight="600" letter-spacing="0.5">PATH A — PASSWORD</text>

    <!-- User Password -->
    <rect x="0" y="12" width="140" height="36" rx="6" fill="#424242"/>
    <text x="70" y="35" text-anchor="middle" class="key-label">User Password</text>

    <!-- Arrow down -->
    <line x1="70" y1="48" x2="70" y2="74" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="78" y="65" class="label">Scrypt KDF</text>

    <!-- Password Key -->
    <rect x="0" y="76" width="140" height="36" rx="6" fill="#2E7D32"/>
    <text x="70" y="99" text-anchor="middle" class="key-label">Password Key (PK)</text>
  </g>

  <!-- ==================== PATH B: RECOVERY ==================== -->
  <g transform="translate(200, 80)">
    <text x="0" y="0" class="text-secondary" font-size="11" font-weight="600" letter-spacing="0.5">PATH B — RECOVERY</text>

    <!-- Recovery Key -->
    <rect x="0" y="12" width="160" height="36" rx="6" fill="#424242"/>
    <text x="80" y="35" text-anchor="middle" class="key-label">Recovery Key (RK)</text>

    <!-- Formats -->
    <text x="0" y="66" class="label">24-word BIP39 mnemonic</text>
    <text x="0" y="80" class="label">64-char hex string</text>
    <text x="0" y="94" class="label">QR code (URI scheme)</text>
  </g>

  <!-- ==================== VAULT KEY (CENTER) ==================== -->
  <g transform="translate(108, 240)">
    <rect width="160" height="44" rx="8" fill="#1565C0"/>
    <text x="80" y="27" text-anchor="middle" class="key-label" font-size="13">Vault Key (VK)</text>
    <text x="80" y="60" text-anchor="middle" class="label">Random 256-bit key</text>
  </g>

  <!-- Arrow: PK wraps VK -->
  <line x1="86" y1="192" x2="150" y2="238" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="60" y="218" fill="#2E7D32" font-family="'SF Mono', monospace" font-size="10">wraps</text>

  <!-- Arrow: RK wraps VK -->
  <line x1="280" y1="174" x2="230" y2="238" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="262" y="218" fill="#1565C0" font-family="'SF Mono', monospace" font-size="10">wraps</text>

  <!-- ==================== STORED IN VAULT FILE ==================== -->
  <g transform="translate(16, 310)">
    <rect width="343" height="100" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="172" y="20" text-anchor="middle" class="text-secondary" font-size="11" font-weight="600" letter-spacing="0.5">STORED IN VAULT FILE</text>
    <line x1="16" y1="30" x2="327" y2="30" stroke="#E0E0E0" stroke-width="1"/>

    <!-- passwordWrappedKey -->
    <rect x="16" y="42" width="148" height="28" rx="4" fill="#2E7D32" opacity="0.15"/>
    <rect x="16" y="42" width="148" height="28" rx="4" fill="none" stroke="#2E7D32" stroke-width="1"/>
    <text x="90" y="60" text-anchor="middle" fill="#2E7D32" font-family="'SF Mono', monospace" font-size="10">passwordWrappedKey</text>

    <!-- recoveryWrappedKey -->
    <rect x="180" y="42" width="148" height="28" rx="4" fill="#1565C0" opacity="0.15"/>
    <rect x="180" y="42" width="148" height="28" rx="4" fill="none" stroke="#1565C0" stroke-width="1"/>
    <text x="254" y="60" text-anchor="middle" fill="#1565C0" font-family="'SF Mono', monospace" font-size="10">recoveryWrappedKey</text>

    <text x="172" y="88" text-anchor="middle" class="label">AES-256-GCM(Key, VK) → encrypted blob</text>
  </g>

  <!-- ==================== UNLOCK FLOW ==================== -->
  <g transform="translate(16, 430)">
    <text x="0" y="0" class="text-secondary" font-size="11" font-weight="600" letter-spacing="0.5">UNLOCK FLOW</text>

    <!-- Either path unwraps VK -->
    <rect x="0" y="14" width="343" height="44" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <text x="172" y="32" text-anchor="middle" class="text-secondary" font-size="12">PK or RK → unwrap → Vault Key (VK)</text>
    <text x="172" y="48" text-anchor="middle" class="label">VK held in memory while unlocked</text>
  </g>

  <!-- Arrow down to secrets -->
  <line x1="188" y1="490" x2="188" y2="520" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ==================== SECRETS ENCRYPTION ==================== -->
  <g transform="translate(16, 522)">
    <rect width="343" height="120" rx="8" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="172" y="24" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Secret Encryption</text>
    <line x1="16" y1="36" x2="327" y2="36" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Encrypt -->
    <text x="24" y="56" class="text-secondary" font-size="11">Encrypt:</text>
    <text x="24" y="72" class="label">AES-256-GCM(VK, plaintext) → iv:ciphertext:tag</text>

    <!-- Decrypt -->
    <text x="24" y="96" class="text-secondary" font-size="11">Decrypt:</text>
    <text x="24" y="112" class="label">AES-256-GCM(VK, iv:ciphertext:tag) → plaintext</text>
  </g>

  <!-- ==================== LOCK ==================== -->
  <g transform="translate(16, 662)">
    <rect width="343" height="44" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <text x="172" y="18" text-anchor="middle" class="text-secondary" font-size="12" font-weight="500">On Lock / Auto-Lock Timeout</text>
    <text x="172" y="34" text-anchor="middle" class="label">VK zeroed via buffer.fill(0) — secrets inaccessible</text>
  </g>

  <!-- Legend -->
  <g transform="translate(16, 730)">
    <rect width="12" height="12" rx="2" fill="#2E7D32"/>
    <text x="18" y="11" class="label">Password path</text>
    <rect x="110" y="0" width="12" height="12" rx="2" fill="#1565C0"/>
    <text x="128" y="11" class="label">Recovery path</text>
    <rect x="220" y="0" width="12" height="12" rx="2" fill="#424242"/>
    <text x="238" y="11" class="label">Shared / core</text>
  </g>
</svg>