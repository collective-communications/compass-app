<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 620" width="375" height="620">
  <defs>
    <style>
      .text-primary { fill: #212121; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-secondary { fill: #757575; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-inverse { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .label { fill: #757575; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 10px; }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#424242"/>
    </marker>
  </defs>

  <rect width="375" height="620" fill="#F5F5F5"/>

  <text x="16" y="36" class="text-primary" font-size="17" font-weight="700">Import Flow</text>
  <text x="16" y="56" class="text-secondary" font-size="12">Two-phase .env import with preview</text>

  <!-- ==================== PHASE 1: PREVIEW ==================== -->
  <g transform="translate(16, 80)">
    <rect width="343" height="24" rx="4" fill="#424242"/>
    <text x="12" y="17" class="text-inverse" font-size="11" font-weight="600">PHASE 1 — PREVIEW</text>
    <text x="280" y="17" class="label" fill="#BDBDBD">POST /import</text>
  </g>

  <!-- .env file -->
  <g transform="translate(16, 118)">
    <rect width="343" height="64" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="16" y="20" class="text-secondary" font-size="12" font-weight="500">User uploads .env file</text>
    <text x="16" y="40" class="label">DB_URL=postgres://...</text>
    <text x="16" y="52" class="label">API_KEY=sk-abc123...</text>
  </g>

  <line x1="188" y1="182" x2="188" y2="206" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Parser -->
  <g transform="translate(16, 208)">
    <rect width="343" height="52" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="16" y="20" class="text-secondary" font-size="12" font-weight="500">Parser extracts key-value pairs</text>
    <text x="16" y="40" class="label">Handles: comments, quotes, escapes, CRLF, BOM, dupes</text>
  </g>

  <line x1="188" y1="260" x2="188" y2="284" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Preview response -->
  <g transform="translate(16, 286)">
    <rect width="343" height="80" rx="6" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="16" y="20" class="text-primary" font-size="12" font-weight="600">Preview Response</text>
    <line x1="16" y1="30" x2="327" y2="30" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Counts -->
    <rect x="16" y="40" width="60" height="24" rx="4" fill="#2E7D32" opacity="0.15"/>
    <text x="46" y="56" text-anchor="middle" fill="#2E7D32" font-family="'SF Mono', monospace" font-size="10" font-weight="600">3 new</text>

    <rect x="86" y="40" width="80" height="24" rx="4" fill="#E65100" opacity="0.15"/>
    <text x="126" y="56" text-anchor="middle" fill="#E65100" font-family="'SF Mono', monospace" font-size="10" font-weight="600">1 updated</text>

    <rect x="176" y="40" width="90" height="24" rx="4" fill="#E0E0E0"/>
    <text x="221" y="56" text-anchor="middle" class="text-secondary" font-family="'SF Mono', monospace" font-size="10">2 unchanged</text>

    <text x="16" y="72" class="label">importId: "abc-123" (links phase 1 → phase 2)</text>
  </g>

  <!-- ==================== PHASE 2: CONFIRM ==================== -->
  <g transform="translate(16, 390)">
    <rect width="343" height="24" rx="4" fill="#424242"/>
    <text x="12" y="17" class="text-inverse" font-size="11" font-weight="600">PHASE 2 — CONFIRM</text>
    <text x="244" y="17" class="label" fill="#BDBDBD">POST /import/confirm</text>
  </g>

  <!-- User confirms -->
  <g transform="translate(16, 428)">
    <rect width="343" height="44" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="16" y="20" class="text-secondary" font-size="12" font-weight="500">User confirms import</text>
    <text x="16" y="36" class="label">Sends importId to validate same session</text>
  </g>

  <line x1="188" y1="472" x2="188" y2="496" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Merge strategy -->
  <g transform="translate(16, 498)">
    <rect width="343" height="68" rx="6" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="16" y="20" class="text-primary" font-size="12" font-weight="600">Additive Merge Strategy</text>
    <line x1="16" y1="30" x2="327" y2="30" stroke="#E0E0E0" stroke-width="1"/>
    <text x="16" y="48" class="label">✓ Create new secrets</text>
    <text x="160" y="48" class="label">✓ Update existing</text>
    <text x="16" y="62" class="label">✗ Never deletes secrets (additive only)</text>
  </g>

  <line x1="188" y1="566" x2="188" y2="586" stroke="#424242" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Result -->
  <g transform="translate(88, 588)">
    <rect width="200" height="24" rx="12" fill="#2E7D32"/>
    <text x="100" y="16" text-anchor="middle" class="text-inverse" font-size="11" font-weight="500">Secrets encrypted and stored</text>
  </g>
</svg>