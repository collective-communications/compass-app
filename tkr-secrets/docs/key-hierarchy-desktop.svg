<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" width="1280" height="560">
  <defs>
    <style>
      .text-primary { fill: #212121; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-secondary { fill: #757575; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-inverse { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .label { fill: #757575; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 11px; }
      .key-label { fill: #FFFFFF; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 12px; font-weight: 600; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#424242"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E7D32"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565C0"/>
    </marker>
  </defs>

  <rect width="1280" height="560" fill="#F5F5F5"/>

  <text x="32" y="40" class="text-primary" font-size="20" font-weight="700">Key Hierarchy</text>
  <text x="32" y="64" class="text-secondary" font-size="13">Dual unlock paths: password and recovery</text>

  <!-- ==================== LEFT: PASSWORD PATH ==================== -->
  <g transform="translate(32, 100)">
    <text x="100" y="0" text-anchor="middle" class="text-secondary" font-size="12" font-weight="600" letter-spacing="0.5">PATH A — PASSWORD</text>

    <rect x="0" y="16" width="200" height="44" rx="8" fill="#424242"/>
    <text x="100" y="44" text-anchor="middle" class="key-label">User Password</text>

    <line x1="100" y1="60" x2="100" y2="96" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="110" y="82" class="label">Scrypt KDF (cost 16384)</text>

    <rect x="0" y="98" width="200" height="44" rx="8" fill="#2E7D32"/>
    <text x="100" y="126" text-anchor="middle" class="key-label">Password Key (PK)</text>
  </g>

  <!-- ==================== RIGHT: RECOVERY PATH ==================== -->
  <g transform="translate(880, 100)">
    <text x="120" y="0" text-anchor="middle" class="text-secondary" font-size="12" font-weight="600" letter-spacing="0.5">PATH B — RECOVERY</text>

    <rect x="0" y="16" width="240" height="44" rx="8" fill="#424242"/>
    <text x="120" y="44" text-anchor="middle" class="key-label">Recovery Key (RK)</text>

    <text x="0" y="84" class="label">24-word BIP39 mnemonic</text>
    <text x="0" y="100" class="label">64-char hex string</text>
    <text x="0" y="116" class="label">QR code (tkr-secrets://recover/...)</text>
  </g>

  <!-- ==================== CENTER: VAULT KEY ==================== -->
  <g transform="translate(480, 240)">
    <rect width="240" height="52" rx="10" fill="#1565C0"/>
    <text x="120" y="32" text-anchor="middle" class="key-label" font-size="14">Vault Key (VK)</text>
    <text x="120" y="72" text-anchor="middle" class="label">Random 256-bit — generated once per vault</text>
  </g>

  <!-- Arrow: PK wraps VK -->
  <line x1="232" y1="242" x2="478" y2="260" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="320" y="238" fill="#2E7D32" font-family="'SF Mono', monospace" font-size="11" font-weight="500">wraps →</text>

  <!-- Arrow: RK wraps VK -->
  <line x1="880" y1="200" x2="722" y2="260" stroke="#1565C0" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="810" y="238" fill="#1565C0" font-family="'SF Mono', monospace" font-size="11" font-weight="500">← wraps</text>

  <!-- ==================== STORED IN VAULT FILE ==================== -->
  <g transform="translate(320, 320)">
    <rect width="560" height="60" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="280" y="18" text-anchor="middle" class="text-secondary" font-size="11" font-weight="600" letter-spacing="0.5">STORED IN VAULT FILE</text>

    <rect x="20" y="30" width="200" height="24" rx="4" fill="#2E7D32" opacity="0.15"/>
    <rect x="20" y="30" width="200" height="24" rx="4" fill="none" stroke="#2E7D32" stroke-width="1"/>
    <text x="120" y="46" text-anchor="middle" fill="#2E7D32" font-family="'SF Mono', monospace" font-size="11">passwordWrappedKey</text>

    <rect x="240" y="30" width="40" height="24" rx="4" fill="none"/>
    <text x="260" y="46" text-anchor="middle" class="text-secondary" font-size="11">+</text>

    <rect x="300" y="30" width="200" height="24" rx="4" fill="#1565C0" opacity="0.15"/>
    <rect x="300" y="30" width="200" height="24" rx="4" fill="none" stroke="#1565C0" stroke-width="1"/>
    <text x="400" y="46" text-anchor="middle" fill="#1565C0" font-family="'SF Mono', monospace" font-size="11">recoveryWrappedKey</text>
  </g>

  <!-- Arrow: VK → Secrets -->
  <line x1="600" y1="380" x2="600" y2="420" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="610" y="406" class="label">VK encrypts/decrypts</text>

  <!-- ==================== SECRETS ==================== -->
  <g transform="translate(320, 422)">
    <rect width="560" height="60" rx="8" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <text x="20" y="24" class="text-primary" font-size="13" font-weight="600">Individual Secrets</text>
    <text x="20" y="44" class="label">AES-256-GCM(VK, plaintext) → iv:ciphertext:tag    (per secret, unique IV)</text>
  </g>

  <!-- Lock behavior -->
  <g transform="translate(320, 500)">
    <rect width="560" height="32" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <text x="280" y="21" text-anchor="middle" class="text-secondary" font-size="12">On lock: VK zeroed via buffer.fill(0) — secrets become inaccessible until next unlock</text>
  </g>

  <!-- Legend -->
  <g transform="translate(32, 530)">
    <rect width="14" height="14" rx="3" fill="#2E7D32"/>
    <text x="20" y="12" class="label">Password path</text>
    <rect x="140" y="0" width="14" height="14" rx="3" fill="#1565C0"/>
    <text x="160" y="12" class="label">Recovery path</text>
    <rect x="280" y="0" width="14" height="14" rx="3" fill="#424242"/>
    <text x="300" y="12" class="label">Shared / core</text>
  </g>
</svg>